<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR TERMINAL</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            background-color: #000000;
            border: 2px solid #222;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terminal-header {
            color: #bc3fa0;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background-color: #000000;
        }

        canvas {
            width: 100%;
            display: block;
            background-color: #050510;
        }

        #priceCanvas {
            height: 320px;
        }

        #histoCanvas {
            height: 180px;
        }

        #strengthCanvas {
            height: 80px;
            border-top: 1px dashed #333;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            width: 100%;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
        }

        .btn {
            background-color: transparent;
            border: 3px solid #bc3fa0;
            color: #bc3fa0;
            font-weight: bold;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            flex: 1;
            min-width: 80px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: rgba(188, 63, 160, 0.1);
        }

        .btn.active {
            background-color: #bc3fa0;
            color: #ffffff;
        }

        .btn-refresh {
            flex: 1.5;
        }

        .api-status {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 5px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #bc3fa0;
            font-size: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">FOR TERMINAL</div>
        
        <div class="chart-wrapper">
            <div id="loadingOverlay" class="loading-overlay">MEMUAT DATA...</div>
            <canvas id="priceCanvas"></canvas>
            <canvas id="histoCanvas"></canvas>
            <canvas id="strengthCanvas"></canvas>
        </div>

        <div class="controls">
            <!-- Timeframe Buttons -->
            <div class="button-row">
                <button class="btn timeframe-btn" data-interval="30min">M30</button>
                <button class="btn timeframe-btn active" data-interval="1h">H1</button>
                <button class="btn timeframe-btn" data-interval="4h">H4</button>
                <button class="btn timeframe-btn" data-interval="1day">D1</button>
                <button class="btn btn-refresh" id="refreshBtn">REFRES API</button>
            </div>

            <!-- Asset Buttons -->
            <div class="button-row">
                <button class="btn asset-btn active" data-symbol="EUR/USD">EURUSG</button>
                <button class="btn asset-btn" data-symbol="GBP/USD">GBPUSD</button>
                <button class="btn asset-btn" data-symbol="XAU/USD">XAUUSD</button>
            </div>
        </div>
        
        <div class="api-status" id="apiStatus">Terhubung ke Twelve Data API</div>
    </div>

    <script>
        const API_KEY = "8cd5e84fa4564322b907aaddac29b059";
        let currentSymbol = "EUR/USD";
        let currentInterval = "1h";
        let candlesData = [];

        // Inisialisasi Canvas
        const priceCanvas = document.getElementById('priceCanvas');
        const histoCanvas = document.getElementById('histoCanvas');
        const strengthCanvas = document.getElementById('strengthCanvas');

        const ctxPrice = priceCanvas.getContext('2d');
        const ctxHisto = histoCanvas.getContext('2d');
        const ctxStrength = strengthCanvas.getContext('2d');

        // Mengatur resolusi tinggi untuk layar Retina
        function resizeCanvases() {
            const dpr = window.devicePixelRatio || 1;
            [priceCanvas, histoCanvas, strengthCanvas].forEach(canvas => {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
            });
            renderCharts();
        }

        window.addEventListener('resize', resizeCanvases);

        // Fetch Data dari Twelve Data
        async function fetchChartData() {
            showLoading(true);
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch(`https://api.twelvedata.com/time_series?symbol=${currentSymbol}&interval=${currentInterval}&apikey=${API_KEY}&outputsize=70`);
                const data = await response.json();

                if (data.status === "ok") {
                    // Balik data agar berurutan dari lama ke baru (chronological order)
                    candlesData = data.values.map(item => ({
                        datetime: item.datetime,
                        open: parseFloat(item.open),
                        high: parseFloat(item.high),
                        low: parseFloat(item.low),
                        close: parseFloat(item.close),
                        volume: parseInt(item.volume || 0)
                    })).reverse();
                    statusEl.textContent = `Data berhasil diperbarui untuk ${currentSymbol} (${currentInterval})`;
                    renderCharts();
                } else {
                    throw new Error(data.message || "Gagal memproses respons API");
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = `Error API: ${error.message}. Menampilkan simulasi data offline.`;
                generateMockData();
                renderCharts();
            } finally {
                showLoading(false);
            }
        }

        function showLoading(active) {
            document.getElementById('loadingOverlay').classList.toggle('active', active);
        }

        // Simulasi data jika terkena limitasi API rate limit
        function generateMockData() {
            candlesData = [];
            let basePrice = currentSymbol.includes("XAU") ? 2300.0 : 1.1000;
            let time = new Date();
            for (let i = 0; i < 70; i++) {
                let change = (Math.random() - 0.49) * (basePrice * 0.005);
                let open = basePrice;
                let close = basePrice + change;
                let high = Math.max(open, close) + (Math.random() * basePrice * 0.002);
                let low = Math.min(open, close) - (Math.random() * basePrice * 0.002);
                
                candlesData.push({
                    datetime: time.toISOString().slice(0, 16).replace('T', ' '),
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                    volume: Math.floor(Math.random() * 1000)
                });
                basePrice = close;
                time.setMinutes(time.getMinutes() - 60);
            }
            candlesData.reverse();
        }

        // --- Perhitungan Indikator Teknis (MQL4 to JS) ---

        // Simple Moving Average
        function calcSMA(data, period) {
            let sma = new Array(data.length).fill(null);
            for (let i = period - 1; i < data.length; i++) {
                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j];
                }
                sma[i] = sum / period;
            }
            return sma;
        }

        // NonLagChannel Filter
        function calcNonLagChannel(baseArray, period = 10, deviation = 0.1) {
            const N = baseArray.length;
            const coeff = 3.0 * Math.PI;
            const phase = period - 1;
            const len = Math.floor(4.0 * period + phase);
            const dt1 = 7.0 / (4.0 * period - 1.0);
            const dt2 = 1.0 / (phase - 1.0);

            let center = new Array(N).fill(null);
            let colors = new Array(N).fill(2); // 0: Up, 1: Dn, 2: Neutral
            let upper = new Array(N).fill(null);
            let lower = new Array(N).fill(null);

            for (let i = 0; i < N; i++) {
                if (i < len) {
                    center[i] = baseArray[i];
                    continue;
                }

                let weight = 0, sum = 0, t = 0;
                for (let j = 0; j < len; j++) {
                    let idx = i - j;
                    if (idx < 0 || baseArray[idx] === null) break;

                    let g = 1.0 / (coeff * t + 1);
                    if (t <= 0.5) g = 1;
                    let beta = Math.cos(Math.PI * t);
                    let alpha = g * beta;

                    sum += alpha * baseArray[idx];
                    weight += alpha;

                    if (t < 1.0) t += dt2;
                    else if (t < len - 1) t += dt1;
                }

                if (weight > 0) {
                    center[i] = sum / weight;
                } else {
                    center[i] = baseArray[i];
                }

                // Deteksi arah trend
                if (i > 0 && center[i] !== null && center[i - 1] !== null) {
                    colors[i] = (center[i] > center[i - 1]) ? 0 : (center[i] < center[i - 1] ? 1 : colors[i - 1]);
                }

                if (center[i] !== null) {
                    upper[i] = center[i] * (1.0 + deviation / 100.0);
                    lower[i] = center[i] * (1.0 - deviation / 100.0);
                }
            }
            return { center, upper, lower, colors };
        }

        // VBox (Histogram Value)
        function calcVBoxValues(data, lookback = 14, smooth = 3) {
            let raw = new Array(data.length).fill(50);
            for (let i = lookback - 1; i < data.length; i++) {
                let highVals = data.slice(i - lookback + 1, i + 1).map(c => c.high);
                let lowVals = data.slice(i - lookback + 1, i + 1).map(c => c.low);
                let hh = Math.max(...highVals);
                let ll = Math.min(...lowVals);
                let range = hh - ll;
                raw[i] = range > 0 ? ((data[i].close - ll) / range) * 100 : 50;
            }

            // Smoothing
            let smoothed = new Array(data.length).fill(50);
            for (let i = smooth - 1; i < raw.length; i++) {
                let sum = 0;
                for (let s = 0; s < smooth; s++) {
                    sum += raw[i - s];
                }
                smoothed[i] = sum / smooth;
            }
            return smoothed;
        }

        // --- Render Visualisasi ---

        function renderCharts() {
            if (candlesData.length === 0) return;

            const dpr = window.devicePixelRatio || 1;
            const pW = priceCanvas.width;
            const pH = priceCanvas.height;
            const hW = histoCanvas.width;
            const hH = histoCanvas.height;
            const sW = strengthCanvas.width;
            const sH = strengthCanvas.height;

            // Reset konteks transformasi
            ctxPrice.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctxHisto.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctxStrength.setTransform(dpr, 0, 0, dpr, 0, 0);

            const displayWidth = pW / dpr;
            const displayHeightPrice = pH / dpr;
            const displayHeightHisto = hH / dpr;
            const displayHeightStrength = sH / dpr;

            // Bersihkan Canvas
            ctxPrice.fillStyle = "#050510";
            ctxPrice.fillRect(0, 0, displayWidth, displayHeightPrice);
            ctxHisto.fillStyle = "#050510";
            ctxHisto.fillRect(0, 0, displayWidth, displayHeightHisto);
            ctxStrength.fillStyle = "#050510";
            ctxStrength.fillRect(0, 0, displayWidth, displayHeightStrength);

            // Tentukan data yang terlihat (misal 50 bar terakhir agar menyerupai gambar)
            const maxVisible = 50;
            const startIndex = Math.max(0, candlesData.length - maxVisible);
            const visibleCandles = candlesData.slice(startIndex);
            const count = visibleCandles.length;

            const spacing = displayWidth / count;
            const candleWidth = spacing * 0.7;

            // --- 1. PROSES GRAFIK HARGA ---
            const highs = visibleCandles.map(c => c.high);
            const lows = visibleCandles.map(c => c.low);
            const maxPrice = Math.max(...highs);
            const minPrice = Math.min(...lows);
            const priceRange = maxPrice - minPrice;
            const pricePadding = priceRange * 0.08;

            const toYPrice = (price) => {
                return displayHeightPrice - ((price - (minPrice - pricePadding)) / (priceRange + pricePadding * 2)) * displayHeightPrice;
            };

            // Hitung NonLagChannel untuk Harga
            const closePrices = candlesData.map(c => c.close);
            const priceSMA = calcSMA(closePrices, 10);
            const priceNLC = calcNonLagChannel(priceSMA, 10, 0.1);

            // Render Latar Belakang Kotak Biru Tua (Vertical Box Histogram)
            for (let i = 0; i < count; i++) {
                const c = visibleCandles[i];
                const x = i * spacing + spacing / 2;
                const yLow = toYPrice(c.low);
                
                ctxPrice.fillStyle = "rgba(12, 20, 69, 0.7)"; // Biru gelap transparan
                ctxPrice.fillRect(x - spacing/2, yLow, spacing, displayHeightPrice - yLow);
            }

            // Render Lilin/Candles & NonLag Lines
            for (let i = 0; i < count; i++) {
                const c = visibleCandles[i];
                const idxInMain = startIndex + i;
                const x = i * spacing + spacing / 2;
                const yOpen = toYPrice(c.open);
                const yClose = toYPrice(c.close);
                const yHigh = toYPrice(c.high);
                const yLow = toYPrice(c.low);

                // Sumbu (Wick)
                ctxPrice.strokeStyle = "#ffffff";
                ctxPrice.lineWidth = 1;
                ctxPrice.beginPath();
                ctxPrice.moveTo(x, yHigh);
                ctxPrice.lineTo(x, yLow);
                ctxPrice.stroke();

                // Badan (Body)
                const isBull = c.close >= c.open;
                ctxPrice.fillStyle = isBull ? "#26a69a" : "#ef5350";
                ctxPrice.strokeStyle = isBull ? "#26a69a" : "#ef5350";
                ctxPrice.lineWidth = 1;
                ctxPrice.fillRect(x - candleWidth / 2, Math.min(yOpen, yClose), candleWidth, Math.max(1, Math.abs(yOpen - yClose)));
                ctxPrice.strokeRect(x - candleWidth / 2, Math.min(yOpen, yClose), candleWidth, Math.max(1, Math.abs(yOpen - yClose)));

                // Garis NonLag Channel Atas & Bawah
                if (i > 0) {
                    const prevIdx = idxInMain - 1;
                    const prevX = (i - 1) * spacing + spacing / 2;

                    const trendColor = priceNLC.colors[idxInMain] === 0 ? "#00c853" : (priceNLC.colors[idxInMain] === 1 ? "#d50000" : "#757575");
                    ctxPrice.strokeStyle = trendColor;
                    ctxPrice.lineWidth = 2;

                    // Jalur Atas
                    if (priceNLC.upper[prevIdx] !== null && priceNLC.upper[idxInMain] !== null) {
                        ctxPrice.beginPath();
                        ctxPrice.moveTo(prevX, toYPrice(priceNLC.upper[prevIdx]));
                        ctxPrice.lineTo(x, toYPrice(priceNLC.upper[idxInMain]));
                        ctxPrice.stroke();
                    }
                    // Jalur Bawah
                    if (priceNLC.lower[prevIdx] !== null && priceNLC.lower[idxInMain] !== null) {
                        ctxPrice.beginPath();
                        ctxPrice.moveTo(prevX, toYPrice(priceNLC.lower[prevIdx]));
                        ctxPrice.lineTo(x, toYPrice(priceNLC.lower[idxInMain]));
                        ctxPrice.stroke();
                    }
                }
            }

            // --- 2. PROSES HISTOGRAM (0-100) ---
            const toYHisto = (val) => {
                return displayHeightHisto - (val / 100) * displayHeightHisto;
            };

            // Hitung VBox smoothed & NonLag Channel untuk Histogram
            const fullVBox = calcVBoxValues(candlesData, 14, 3);
            const vBoxSMA = calcSMA(fullVBox, 10);
            const vBoxNLC = calcNonLagChannel(vBoxSMA, 10, 0.1);

            const visibleVBox = fullVBox.slice(startIndex);

            // Garis Pembatas Statis 15 dan 85 (Dashed)
            ctxHisto.setLineDash([5, 5]);
            ctxHisto.strokeStyle = "#ffd600"; // Kuning di level atas
            ctxHisto.lineWidth = 1;
            ctxHisto.beginPath();
            ctxHisto.moveTo(0, toYHisto(85));
            ctxHisto.lineTo(displayWidth, toYHisto(85));
            ctxHisto.stroke();

            ctxHisto.strokeStyle = "#00e5ff"; // Aqua di level bawah
            ctxHisto.beginPath();
            ctxHisto.moveTo(0, toYHisto(15));
            ctxHisto.lineTo(displayWidth, toYHisto(15));
            ctxHisto.stroke();
            ctxHisto.setLineDash([]); // Reset line dash

            // Render Bar Histogram & NonLag Channel Histogram
            for (let i = 0; i < count; i++) {
                const c = visibleCandles[i];
                const val = visibleVBox[i];
                const idxInMain = startIndex + i;
                const x = i * spacing + spacing / 2;

                // Batang Histogram
                ctxHisto.fillStyle = (c.close >= c.open) ? "#29b6f6" : "#ec407a"; // DodgerBlue vs DeepPink
                ctxHisto.fillRect(x - candleWidth / 2, toYHisto(val), candleWidth, displayHeightHisto - toYHisto(val));

                // Garis NonLag untuk Histogram
                if (i > 0) {
                    const prevIdx = idxInMain - 1;
                    const prevX = (i - 1) * spacing + spacing / 2;

                    const trendColor = vBoxNLC.colors[idxInMain] === 0 ? "#00c853" : (vBoxNLC.colors[idxInMain] === 1 ? "#d50000" : "#757575");
                    ctxHisto.strokeStyle = trendColor;
                    ctxHisto.lineWidth = 1.5;

                    if (vBoxNLC.upper[prevIdx] !== null && vBoxNLC.upper[idxInMain] !== null) {
                        ctxHisto.beginPath();
                        ctxHisto.moveTo(prevX, toYHisto(vBoxNLC.upper[prevIdx]));
                        ctxHisto.lineTo(x, toYHisto(vBoxNLC.upper[idxInMain]));
                        ctxHisto.stroke();
                    }
                    if (vBoxNLC.lower[prevIdx] !== null && vBoxNLC.lower[idxInMain] !== null) {
                        ctxHisto.beginPath();
                        ctxHisto.moveTo(prevX, toYHisto(vBoxNLC.lower[prevIdx]));
                        ctxHisto.lineTo(x, toYHisto(vBoxNLC.lower[idxInMain]));
                        ctxHisto.stroke();
                    }
                }

                // Sinyal Panah berdasarkan logika filter dinamis MQL4
                const isBuy = (val <= 15) && (vBoxNLC.lower[idxInMain] !== null && val <= vBoxNLC.lower[idxInMain]);
                const isSell = (val >= 85) && (vBoxNLC.upper[idxInMain] !== null && val >= vBoxNLC.upper[idxInMain]);

                if (isBuy) {
                    // Panah Naik Putih di level 15
                    ctxHisto.fillStyle = "#ffffff";
                    ctxHisto.font = "14px Arial";
                    ctxHisto.textAlign = "center";
                    ctxHisto.fillText("↑", x, toYHisto(15) + 12);
                } else if (isSell) {
                    // Panah Turun Kuning di level 85
                    ctxHisto.fillStyle = "#ffd600";
                    ctxHisto.font = "14px Arial";
                    ctxHisto.textAlign = "center";
                    ctxHisto.fillText("↓", x, toYHisto(85) - 4);
                }
            }

            // --- 3. PROSES BLOK KEKUATAN (kekuatan.mq4) ---
            // Buat pembagian blok harian/periode dinamis
            let blocks = [];
            let currentBlock = { start: 0, end: 0, label: "" };

            for (let i = 0; i < count; i++) {
                const c = visibleCandles[i];
                const dateStr = c.datetime.split(' ')[0]; // Ambil komponen tanggal saja YYYY-MM-DD
                
                let isNewBlock = false;
                if (currentInterval === "1day") {
                    // Jika timeframe D1, bagi per 12 bar secara visual
                    isNewBlock = (i > 0 && i % 12 === 0);
                } else {
                    // Jika intraday, bagi berdasarkan pergantian hari kalender
                    isNewBlock = (i > 0 && dateStr !== visibleCandles[i - 1].datetime.split(' ')[0]);
                }

                if (isNewBlock) {
                    currentBlock.end = i - 1;
                    blocks.push(currentBlock);
                    currentBlock = { start: i, end: i, label: dateStr };
                } else {
                    currentBlock.end = i;
                    if (!currentBlock.label) currentBlock.label = dateStr;
                }
            }
            blocks.push(currentBlock);

            // Batasi jumlah pembagian visual agar pas di layar jika datanya sedikit/banyak
            if (blocks.length < 2) {
                // Skenario fallback: bagi rata menjadi 4 segmen jika hanya mencakup 1 hari kalender
                blocks = [];
                const blockSize = Math.ceil(count / 4);
                for (let b = 0; b < 4; b++) {
                    blocks.push({
                        start: b * blockSize,
                        end: Math.min((b + 1) * blockSize - 1, count - 1),
                        label: ""
                    });
                }
            }

            // Render pembatas vertikal dan teks kekuatan
            blocks.forEach((block, bIdx) => {
                const startX = block.start * spacing;
                const endX = (block.end + 1) * spacing;
                const midX = startX + (endX - startX) / 2;

                // Gambar Garis Pembatas Grid Vertikal (Dotted)
                if (bIdx > 0) {
                    ctxStrength.strokeStyle = "#444444";
                    ctxStrength.lineWidth = 1;
                    ctxStrength.setLineDash([3, 3]);
                    ctxStrength.beginPath();
                    ctxStrength.moveTo(startX, 0);
                    ctxStrength.lineTo(startX, displayHeightStrength);
                    ctxStrength.stroke();
                    ctxStrength.setLineDash([]);
                }

                // Kalkulasi persentase kekuatan badan lilin
                let totalBuy = 0;
                let totalSell = 0;

                for (let k = block.start; k <= block.end; k++) {
                    const c = visibleCandles[k];
                    const body = c.close - c.open;
                    if (body > 0) {
                        totalBuy += body;
                    } else if (body < 0) {
                        totalSell += Math.abs(body);
                    }
                }

                const total = totalBuy + totalSell;
                const buyPct = total > 0 ? Math.round((totalBuy / total) * 100) : 50;
                const sellPct = total > 0 ? Math.round((totalSell / total) * 100) : 50;

                // Gambar Teks Persentase Kekuatan
                ctxStrength.font = "bold 13px Arial";
                ctxStrength.textAlign = "center";
                
                // Baris Sell
                ctxStrength.fillStyle = "#ffffff";
                ctxStrength.fillText(`sell ${sellPct} %`, midX, 32);

                // Baris Buy
                ctxStrength.fillStyle = "#ffffff";
                ctxStrength.fillText(`buy ${buyPct} %`, midX, 60);
            });
        }

        // --- Kontrol UI & Navigasi ---

        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentInterval = e.target.getAttribute('data-interval');
                fetchChartData();
            });
        });

        document.querySelectorAll('.asset-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.asset-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSymbol = e.target.getAttribute('data-symbol');
                fetchChartData();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchChartData);

        // Inisialisasi awal saat dimuat
        resizeCanvases();
        fetchChartData();
    </script>
</body>
</html>
